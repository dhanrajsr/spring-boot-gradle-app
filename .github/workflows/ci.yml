name: Gradle CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  IMAGE_NAME: spring-gradle-app

jobs:
  # ─────────────────────────────────────────
  # Stage 1: Build & Compile
  # ─────────────────────────────────────────
  build:
    name: Build & Compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      - name: Compile source code
        run: ./gradlew classes --no-daemon -q

      - name: Upload compiled classes
        uses: actions/upload-artifact@v4
        with:
          name: compiled-classes
          path: build/classes
          retention-days: 1

  # ─────────────────────────────────────────
  # Stage 2: Unit Tests & Code Coverage
  # ─────────────────────────────────────────
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      checks: write      # required by dorny/test-reporter to post check results

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      - name: Run unit tests with coverage
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification --no-daemon -q

      - name: Publish test results to GitHub Actions Summary
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Gradle Test Results
          path: build/test-results/test/*.xml
          reporter: java-junit

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: gradle
          fail_ci_if_error: true

  # ─────────────────────────────────────────
  # Stage 3: Code Quality
  # ─────────────────────────────────────────
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      - name: Run Checkstyle
        run: ./gradlew checkstyleMain --no-daemon -q

      - name: Run SpotBugs (static analysis)
        run: ./gradlew spotbugsMain --no-daemon -q

      - name: Upload SpotBugs report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: build/reports/spotbugs/
          retention-days: 7

  # ─────────────────────────────────────────
  # Stage 4: Security - Dependency Scan
  # ─────────────────────────────────────────
  dependency-security-scan:
    name: Dependency Security Scan (OWASP)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      - name: OWASP Dependency Check
        run: ./gradlew dependencyCheckAnalyze --no-daemon || true

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: build/reports/dependency-check-report.html
          retention-days: 7

  # ─────────────────────────────────────────
  # Stage 5: Package (JAR)
  # ─────────────────────────────────────────
  package:
    name: Package Application
    runs-on: ubuntu-latest
    needs: [ test, code-quality ]

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      - name: Build bootJar
        run: ./gradlew bootJar --no-daemon -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 7

  # ─────────────────────────────────────────
  # Stage 6: Docker Build & Image Scan
  # ─────────────────────────────────────────
  docker-build-scan:
    name: Docker Build & Security Scan
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Trivy - Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-results.sarif
          retention-days: 7

      - name: Save image for push job
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ─────────────────────────────────────────
  # Stage 7: Push to Docker Hub (main only)
  # ─────────────────────────────────────────
  # Stage 7: Push to Docker Hub (main only)
  # ─────────────────────────────────────────
  docker-push:
    name: Push Docker Image to Docker Hub
    runs-on: ubuntu-latest
    needs: docker-build-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push image to Docker Hub
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

  # ─────────────────────────────────────────
  # Stage 8: Deploy to Staging (main only)
  # Runs on self-hosted runner (your MacBook)
  # so it can deploy to local Docker Desktop
  # ─────────────────────────────────────────
  # Stage 8: Update GitOps repo → ArgoCD auto-deploys to Staging
  # CI pushes new image tag to spring-gitops repo
  # ArgoCD detects the change and syncs automatically (no approval)
  # ─────────────────────────────────────────
  deploy-staging:
    name: Update GitOps Repo → ArgoCD deploys to Staging
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: http://localhost:30081

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: dhanrajsr/spring-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: spring-gitops

      - name: Update image tag and appVersion, then push to GitOps repo
        run: |
          APP_VERSION=$(grep '^version' build.gradle | head -1 | awk -F"'" '{print $2}' | sed 's/-SNAPSHOT//')
          sed -i "s/tag:.*/tag: ${{ github.sha }}/" spring-gitops/apps/spring-gradle/helm/values.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${APP_VERSION}\"/" spring-gitops/apps/spring-gradle/helm/Chart.yaml
          cd spring-gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/spring-gradle/helm/values.yaml apps/spring-gradle/helm/Chart.yaml
          git commit -m "ci(spring-gradle): update image tag to ${{ github.sha }} and appVersion to ${APP_VERSION}"
          git push


  # ─────────────────────────────────────────
  # Stage 9: Await approval → ArgoCD syncs Production
  # Requires manual approval in GitHub Environments
  # After approval, go to ArgoCD UI and click Sync on spring-gradle-production
  # ─────────────────────────────────────────
  deploy-production:
    name: Approve → ArgoCD syncs Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: http://localhost:30091

    steps:
      - name: Notify production is ready to sync
        run: |
          echo "Staging deployed successfully with image tag: ${{ github.sha }}"
          echo "Production ArgoCD app is OutOfSync — go to ArgoCD UI and click Sync to deploy."
          echo "ArgoCD URL: https://localhost:31607"
